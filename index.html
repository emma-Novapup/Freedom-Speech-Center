<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Stranger Video Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h2 {
            margin-bottom: 5px;
        }
        #status {
            color: #aaa;
            font-style: italic;
            margin-bottom: 20px;
            height: 20px;
        }
        .video-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 10px;
        }
        .video-box {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        video {
            width: 45vw;
            max-width: 500px;
            height: 350px;
            background: #000;
            border-radius: 8px;
            object-fit: cover;
        }
        .controls {
            margin-top: 25px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin: 5px;
        }
        #startBtn { background: #4CAF50; color: white; }
        #startBtn:hover { background: #45a049; }
        #nextBtn { background: #008CBA; color: white; }
        #nextBtn:hover { background: #007bb5; }
        button:disabled {
            background: #444 !important;
            color: #888;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h2>Stranger Video Chat</h2>
    <div id="status">Click "1. Start Webcam" to begin</div>

    <div class="video-container">
        <div class="video-box">
            <h3>You</h3>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <h3>Stranger</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">1. Start Webcam</button>
        <button id="nextBtn" disabled>2. Find Stranger</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAX9fQ-K0fr4qStsindjTaJB-GgqsFRBao",
            authDomain: "speechcenter-782d8.firebaseapp.com",
            projectId: "speechcenter-782d8",
            storageBucket: "speechcenter-782d8.firebasestorage.app",
            messagingSenderId: "206538066727",
            appId: "1:206538066727:web:6ffd67acfd46c233a33702",
            measurementId: "G-LXE9LMDC90"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        // FIXED: Using default firestore instance
        const db = firebase.firestore();

        // Anonymous Auth - Make sure this is enabled in Firebase Console > Authentication
        firebase.auth().signInAnonymously().catch((error) => {
            console.error("Auth failed: ", error);
        });

        const servers = {
            iceServers: [
                { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }
            ],
            iceCandidatePoolSize: 10,
        };

        let pc = null;
        let localStream = null;
        let remoteStream = null;
        let currentRoomRef = null;
        let roomListener = null;
        let candidateListener = null;

        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusText = document.getElementById('status');

        startBtn.onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                statusText.innerText = "Webcam ready. Click 'Find Stranger' to connect!";
                nextBtn.disabled = false;
                startBtn.disabled = true;
            } catch (e) {
                statusText.innerText = "Error accessing camera.";
                console.error(e);
            }
        };

        nextBtn.onclick = async () => {
            nextBtn.disabled = true;
            statusText.innerText = "Searching for a stranger...";
            await endCurrentCall();

            pc = new RTCPeerConnection(servers);
            remoteStream = new MediaStream();

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = event => event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
            remoteVideo.srcObject = remoteStream;

            try {
                const availableRooms = await db.collection('rooms')
                    .where('status', '==', 'waiting')
                    .limit(1)
                    .get();

                if (!availableRooms.empty) {
                    const roomDoc = availableRooms.docs[0];
                    currentRoomRef = roomDoc.ref;
                    statusText.innerText = "Connecting to stranger...";
                    await joinRoom(roomDoc.data());
                } else {
                    statusText.innerText = "Waiting for a stranger to join you...";
                    await createRoom();
                }
            } catch (err) {
                statusText.innerText = "Connection error. Check Console.";
                console.error("Firestore Error: ", err);
                nextBtn.disabled = false;
            }
        };

        async function createRoom() {
            currentRoomRef = db.collection('rooms').doc();
            const offerCandidates = currentRoomRef.collection('offerCandidates');
            const answerCandidates = currentRoomRef.collection('answerCandidates');

            pc.onicecandidate = event => {
                if (event.candidate) offerCandidates.add(event.candidate.toJSON());
            };

            const offerDescription = await pc.createOffer();
            await pc.setLocalDescription(offerDescription);

            await currentRoomRef.set({
                status: 'waiting',
                offer: { sdp: offerDescription.sdp, type: offerDescription.type }
            });

            roomListener = currentRoomRef.onSnapshot(snapshot => {
                const data = snapshot.data();
                if (!pc.currentRemoteDescription && data?.answer) {
                    statusText.innerText = "Stranger connected!";
                    nextBtn.disabled = false;
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });

            candidateListener = answerCandidates.onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                    }
                });
            });
        }

        async function joinRoom(roomData) {
            const answerCandidates = currentRoomRef.collection('answerCandidates');
            const offerCandidates = currentRoomRef.collection('offerCandidates');

            pc.onicecandidate = event => {
                if (event.candidate) answerCandidates.add(event.candidate.toJSON());
            };

            await currentRoomRef.update({ status: 'connected' });

            await pc.setRemoteDescription(new RTCSessionDescription(roomData.offer));
            const answerDescription = await pc.createAnswer();
            await pc.setLocalDescription(answerDescription);

            await currentRoomRef.update({
                answer: { sdp: answerDescription.sdp, type: answerDescription.type }
            });

            statusText.innerText = "Stranger connected!";
            nextBtn.disabled = false;

            candidateListener = offerCandidates.onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                    }
                });
            });
        }

        async function endCurrentCall() {
            if (roomListener) roomListener();
            if (candidateListener) candidateListener();
            if (pc) {
                pc.close();
                pc = null;
            }
            if (currentRoomRef) {
                const room = currentRoomRef;
                currentRoomRef = null;
                try { await room.delete(); } catch(e) {}
            }
            remoteVideo.srcObject = null;
        }

        window.onbeforeunload = () => { endCurrentCall(); };
    </script>
</body>
</html>
