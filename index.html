<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Video Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #1e1e1e;
            color: white;
        }
        .video-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        video {
            width: 400px;
            height: 300px;
            background: #333;
            border-radius: 8px;
            object-fit: cover;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }
        input {
            padding: 10px;
            width: 250px;
        }
    </style>
</head>
<body>
    <h2>WebRTC Video Chat via Firestore</h2>

    <div class="video-container">
        <div>
            <h3>Local Stream</h3>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div>
            <h3>Remote Stream</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button id="webcamBtn">1. Start Webcam</button>
        <button id="createBtn" disabled>2. Create Call (Offer)</button>
        <input id="callInput" type="text" placeholder="Paste Call ID here...">
        <button id="joinBtn" disabled>3. Join Call (Answer)</button>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <!-- Main Logic -->
    <script src="app.js"></script>
</body>
</html>
