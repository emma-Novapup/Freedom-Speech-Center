<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Stranger Video Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h2 {
            margin-bottom: 5px;
        }
        #status {
            color: #aaa;
            font-style: italic;
            margin-bottom: 20px;
            height: 20px;
        }
        .video-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 10px;
        }
        .video-box {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        video {
            width: 45vw;
            max-width: 500px;
            height: 350px;
            background: #000;
            border-radius: 8px;
            object-fit: cover;
        }
        .controls {
            margin-top: 25px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin: 5px;
        }
        #startBtn { background: #4CAF50; color: white; }
        #startBtn:hover { background: #45a049; }
        #nextBtn { background: #008CBA; color: white; }
        #nextBtn:hover { background: #007bb5; }
        button:disabled {
            background: #444 !important;
            color: #888;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h2>Stranger Video Chat</h2>
    <div id="status">Click "1. Start Webcam" to begin</div>

    <div class="video-container">
        <div class="video-box">
            <h3>You</h3>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div class="video-box">
            <h3>Stranger</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn">1. Start Webcam</button>
        <button id="nextBtn" disabled>2. Find Stranger</button>
    </div>

    <script>
        const servers = {
            iceServers: [
                { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }
            ],
            iceCandidatePoolSize: 10,
        };

        let pc = null;
        let localStream = null;
        let remoteStream = null;

        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusText = document.getElementById('status');

        startBtn.onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                statusText.innerText = "Webcam ready. Click 'Find Stranger' to connect!";
                nextBtn.disabled = false;
                startBtn.disabled = true;
            } catch (e) {
                statusText.innerText = "Error accessing camera.";
                console.error(e);
            }
        };

        nextBtn.onclick = async () => {
            nextBtn.disabled = true;
            statusText.innerText = "Searching for a stranger...";
            await endCurrentCall();

            pc = new RTCPeerConnection(servers);
            remoteStream = new MediaStream();

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.ontrack = event => event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
            remoteVideo.srcObject = remoteStream;

            try {
                // TODO: Replace with your custom signaling server logic to find/create a room
                statusText.innerText = "Connecting to stranger...";
                await initiateSignaling();
            } catch (err) {
                statusText.innerText = "Connection error. Check Console.";
                console.error("Signaling Error: ", err);
                nextBtn.disabled = false;
            }
        };

        async function initiateSignaling() {
            // Placeholder: Wire your WebSockets/Socket.io signaling mechanics here
            pc.onicecandidate = event => {
                if (event.candidate) {
                    // sendSignalingData({ type: 'candidate', candidate: event.candidate.toJSON() });
                }
            };

            // Example workflow logic:
            // 1. Check your backend if a room is waiting.
            // 2. If YES: Join room, handle offer, create answer, send answer back.
            // 3. If NO: Create room, create offer, set local description, send offer to backend.
        }

        async function endCurrentCall() {
            if (pc) {
                pc.close();
                pc = null;
            }
            remoteVideo.srcObject = null;
        }

        window.onbeforeunload = () => { endCurrentCall(); };
    </script>
</body>
</html>
